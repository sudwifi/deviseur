<title>🛜 Telmat — Sud Wifi</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;600;700&display=swap');

  :root {
    --bg: #060b18;
    --surface: #0d1629;
    --border: #1a2a4a;
    --accent: #00c8ff;
    --accent2: #ff6b35;
    --text: #e8f4ff;
    --muted: #5a7a9a;
    --camping: #00e5a0;
    --hotel: #a78bfa;
    --other: #fbbf24;
    --radius: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    min-height: 100dvh;
    padding: 0;
    overflow-x: hidden;
  }

  /* BG grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,200,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,200,255,0.03) 1px, transparent 1px);
    background-size: 30px 30px;
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(6,11,24,0.92);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px 10px;
  }

  .header-top {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }

  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: 0.8;
  }

  .title {
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    flex: 1;
  }

  .count-badge {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    background: rgba(0,200,255,0.1);
    border: 1px solid rgba(0,200,255,0.2);
    border-radius: 20px;
    padding: 3px 8px;
  }

  /* Search */
  .search-wrap {
    position: relative;
  }

  .search-wrap svg {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    width: 15px;
    height: 15px;
  }

  #search {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 9px 12px 9px 32px;
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  #search:focus {
    border-color: var(--accent);
  }

  #search::placeholder { color: var(--muted); }

  /* Filter tabs */
  .filters {
    display: flex;
    gap: 6px;
    padding: 10px 16px;
    overflow-x: auto;
    scrollbar-width: none;
    background: rgba(6,11,24,0.7);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 107px;
    z-index: 99;
    backdrop-filter: blur(10px);
  }

  .filters::-webkit-scrollbar { display: none; }

  .filter-btn {
    flex-shrink: 0;
    padding: 5px 12px;
    border-radius: 20px;
    font-family: 'Outfit', sans-serif;
    font-size: 12px;
    font-weight: 600;
    border: 1px solid transparent;
    background: var(--surface);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.3px;
  }

  .filter-btn.active {
    background: rgba(0,200,255,0.12);
    border-color: var(--accent);
    color: var(--accent);
  }

  .filter-btn[data-filter="camping"].active {
    background: rgba(0,229,160,0.12);
    border-color: var(--camping);
    color: var(--camping);
  }

  .filter-btn[data-filter="hotel"].active {
    background: rgba(167,139,250,0.12);
    border-color: var(--hotel);
    color: var(--hotel);
  }

  .filter-btn[data-filter="other"].active {
    background: rgba(251,191,36,0.12);
    border-color: var(--other);
    color: var(--other);
  }

  /* Content */
  main {
    position: relative;
    z-index: 1;
    padding: 14px 12px 80px;
  }

  .section {
    margin-bottom: 24px;
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 4px;
    margin-bottom: 10px;
  }

  .section-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 700;
  }

  .section-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .section-count {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
  }

  /* Grid */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  /* Card */
  .card {
    display: block;
    text-decoration: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 11px;
    position: relative;
    overflow: hidden;
    transition: transform 0.15s, border-color 0.15s, background 0.15s;
    min-height: 72px;
    cursor: pointer;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 3px;
    height: 100%;
    border-radius: var(--radius) 0 0 var(--radius);
  }

  .card.camping::before { background: var(--camping); }
  .card.hotel::before { background: var(--hotel); }
  .card.other::before { background: var(--other); }

  .card:active {
    transform: scale(0.96);
    background: rgba(13,22,41,0.8);
  }

  .card.camping:active { border-color: var(--camping); }
  .card.hotel:active { border-color: var(--hotel); }
  .card.other:active { border-color: var(--other); }

  .card-type {
    font-size: 8px;
    font-family: 'Space Mono', monospace;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 5px;
  }

  .card.camping .card-type { color: var(--camping); }
  .card.hotel .card-type { color: var(--hotel); }
  .card.other .card-type { color: var(--other); }

  .card-name {
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.35;
    word-break: break-word;
  }

  .card-ip {
    margin-top: 6px;
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Pulse dot */
  .card::after {
    content: '';
    position: absolute;
    top: 9px;
    right: 9px;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--muted);
    opacity: 0.3;
  }

  .card.camping::after { background: var(--camping); }
  .card.hotel::after { background: var(--hotel); }
  .card.other::after { background: var(--other); }

  /* Hidden */
  .hidden { display: none !important; }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: 14px;
    display: none;
  }

  .empty svg {
    width: 40px;
    height: 40px;
    margin-bottom: 12px;
    opacity: 0.3;
  }

  /* Footer */
  footer {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(6,11,24,0.95);
    border-top: 1px solid var(--border);
    padding: 8px 16px 14px;
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    text-align: center;
    letter-spacing: 1px;
    backdrop-filter: blur(10px);
    z-index: 100;
  }

  footer span { color: var(--accent); }

  /* No results */
  #no-results {
    display: none;
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }

  #no-results p { margin-top: 10px; font-size: 13px; }
</style>

function extractIP(url) {
  try {
    const u = new URL(url);
    return u.hostname + ':' + u.port;
  } catch { return url; }
}

function buildCard(site) {
  const a = document.createElement('a');
  a.href = site.url;
  a.className = `card ${site.type}`;
  a.target = '_blank';
  a.rel = 'noopener';

  const typeLabel = { camping: '🏕 Camping', hotel: '🏨 Hôtel', other: '🏢 Autre' }[site.type];
  a.innerHTML = `
    <div class="card-type">${typeLabel}</div>
    <div class="card-name">${site.name}</div>
    <div class="card-ip">${extractIP(site.url)}</div>
  `;
  return a;
}

function render(query = '', filter = 'all') {
  const q = query.toLowerCase().trim();
  const grids = { camping: document.getElementById('grid-camping'), hotel: document.getElementById('grid-hotel'), other: document.getElementById('grid-other') };
  Object.values(grids).forEach(g => g.innerHTML = '');

  const counts = { camping: 0, hotel: 0, other: 0 };
  let total = 0;

  sites.forEach(site => {
    if (filter !== 'all' && site.type !== filter) return;
    if (q && !site.name.toLowerCase().includes(q) && !extractIP(site.url).includes(q)) return;
    const card = buildCard(site);
    grids[site.type].appendChild(card);
    counts[site.type]++;
    total++;
  });

  document.getElementById('count-camping').textContent = counts.camping ? `${counts.camping}` : '';
  document.getElementById('count-hotel').textContent = counts.hotel ? `${counts.hotel}` : '';
  document.getElementById('count-other').textContent = counts.other ? `${counts.other}` : '';
  document.getElementById('visible-count').textContent = `${total} site${total > 1 ? 's' : ''}`;

  // Hide empty sections
  ['camping','hotel','other'].forEach(type => {
    const section = document.querySelector(`[data-section="${type}"]`);
    section.style.display = counts[type] === 0 ? 'none' : '';
  });

  const noRes = document.getElementById('no-results');
  noRes.style.display = total === 0 ? 'block' : 'none';
  if (total === 0) document.getElementById('search-term').textContent = query;
}

// Search
let currentFilter = 'all';
document.getElementById('search').addEventListener('input', e => {
  render(e.target.value, currentFilter);
});

// Filters
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    render(document.getElementById('search').value, currentFilter);
  });
});

// Date footer
const d = new Date();
document.getElementById('date-footer').textContent = d.toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit', year: '2-digit' });

// Initial render
