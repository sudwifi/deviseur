<style>

  :root {
    --bg: #0d0f14;
    --surface: #151820;
    --border: #252a35;
    --accent: #00d4ff;
    --green: #00e676;
    --red: #ff3d3d;
    --orange: #ff9800;
    --text: #e8eaf0;
    --muted: #5a6070;
    --card-hover: #1a1f2e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'JetBrains Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  header {
    padding: 18px 28px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  header h1 {
    font-family: 'Syne', sans-serif;
    font-size: 1.2rem;
    font-weight: 800;
    color: var(--accent);
    letter-spacing: -0.02em;
  }

  .header-stats {
    margin-left: auto;
    display: flex;
    gap: 16px;
    align-items: center;
    font-size: 0.7rem;
  }

  .stat-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-radius: 20px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
  }
  .dot { width: 7px; height: 7px; border-radius: 50%; }
  .dot.green { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .dot.red   { background: var(--red);   box-shadow: 0 0 6px var(--red); }
  .dot.wait  { background: var(--orange); }

  .content { padding: 24px 28px; }

  .toolbar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .btn {
    background: rgba(0, 212, 255, 0.1);
    border: 1px solid rgba(0, 212, 255, 0.3);
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    font-weight: 600;
    padding: 7px 16px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn:hover { background: rgba(0, 212, 255, 0.2); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .progress-wrap {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    min-width: 80px;
  }
  .progress-bar {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    width: 0%;
    transition: width 0.2s;
  }

  .last-refresh { font-size: 0.65rem; color: var(--muted); white-space: nowrap; }

  .search-wrap { position: relative; }
  .search-wrap input {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    padding: 7px 12px 7px 28px;
    border-radius: 6px;
    outline: none;
    width: 220px;
    transition: border-color 0.15s;
  }
  .search-wrap input:focus { border-color: rgba(0,212,255,0.4); }
  .search-wrap::before {
    content: '🔍';
    position: absolute;
    left: 8px; top: 50%;
    transform: translateY(-50%);
    font-size: 0.7rem;
  }

  .section-label {
    font-size: 0.62rem;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin: 24px 0 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }
  .section-label:first-child { margin-top: 0; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 7px;
  }

  .card {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 13px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    text-decoration: none;
    color: var(--text);
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
  }
  .card:hover {
    background: var(--card-hover);
    border-color: rgba(0,212,255,0.25);
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  }
  .card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--muted);
    transition: background 0.3s;
  }
  .card.up::before    { background: var(--green); }
  .card.down::before  { background: var(--red); }
  .card.pending::before { background: var(--orange); }

  .status-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
    background: var(--muted);
    transition: all 0.3s;
  }
  .card.up   .status-dot { background: var(--green); box-shadow: 0 0 8px var(--green); }
  .card.down .status-dot { background: var(--red);   box-shadow: 0 0 8px var(--red); }
  .card.pending .status-dot { background: var(--orange); animation: pulse 1s infinite; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  .card-info { flex: 1; min-width: 0; }
  .card-name {
    font-size: 0.76rem;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.3;

    white-space: nowrap;
    overflow: hidden;

  footer {

    padding: 20px;
    font-size: 0.62rem;
    color: var(--muted);
    border-top: 1px solid var(--border);
    margin-top: 12px;

</style>

const CARDS = {};
let cardCounter = 0;

// ── BUILD ──────────────────────────────────────────────────────────────────
function buildCards() {
  const grid = document.getElementById('grid-ftth');
  DATA.forEach(item => {
    const id = 'c' + (++cardCounter);
    let host;
    try { host = new URL(item.url).host; } catch(e) { host = item.url; }
    const card = document.createElement('a');
    card.className = 'card pending';
    card.href = item.url;
    card.target = '_blank';
    card.id = id;
    card.dataset.name = item.name.toLowerCase();
    card.innerHTML = `
      <div class="status-dot"></div>
      <div class="card-info">
        <div class="card-name">${item.name}</div>
        <div class="card-url">${host}</div>
      </div>
      <div class="card-latency">…</div>
    `;
    grid.appendChild(card);
    CARDS[id] = { el: card, url: item.url, status: 'pending' };
  });
  updateStats();
}

// ── PING ───────────────────────────────────────────────────────────────────
const TIMEOUT_MS = 6000;
const CONCURRENCY = 20;

async function pingOne(id) {
  const { el, url } = CARDS[id];
  const latEl = el.querySelector('.card-latency');
  el.className = 'card pending';
  latEl.textContent = '…';
  CARDS[id].status = 'pending';

  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), TIMEOUT_MS);
  const t0 = Date.now();

  try {
    await fetch(url, { method: 'HEAD', mode: 'no-cors', cache: 'no-store', signal: controller.signal });
    clearTimeout(timer);
    const ms = Date.now() - t0;
    el.className = 'card up';
    latEl.textContent = ms + 'ms';
    CARDS[id].status = 'up';
  } catch(e) {
    clearTimeout(timer);
    if (e.name === 'AbortError') {
      el.className = 'card down';
      latEl.textContent = 'TIMEOUT';
      CARDS[id].status = 'down';
    } else {
      // Network error = host responded (CORS block), so it's alive
      const ms = Date.now() - t0;
      el.className = 'card up';
      latEl.textContent = ms + 'ms';
      CARDS[id].status = 'up';
    }
  }
  updateStats();
}

  const btn = document.getElementById('btn-refresh');
  const prog = document.getElementById('prog');
  const lr = document.getElementById('lr');
  btn.disabled = true;
  prog.style.width = '0%';

  let done = 0;
  const total = ids.length;
  for (let i = 0; i < total; i += CONCURRENCY) {
    const batch = ids.slice(i, i + CONCURRENCY);
    await Promise.all(batch.map(pingOne));
    done += batch.length;
    prog.style.width = Math.round(done / total * 100) + '%';
  }

  prog.style.width = '100%';
  lr.textContent = 'MAJ ' + new Date().toLocaleTimeString('fr-FR');
  btn.disabled = false;
  updateStats();
}

function updateStats() {
  const all = Object.values(CARDS);
  document.getElementById('count-up').textContent   = all.filter(c => c.status === 'up').length;
  document.getElementById('count-down').textContent  = all.filter(c => c.status === 'down').length;
  document.getElementById('count-wait').textContent  = all.filter(c => c.status === 'pending').length;
}

function filterCards(q) {
  q = q.toLowerCase().trim();
  document.querySelectorAll('.card').forEach(card => {
    card.style.display = (!q || card.dataset.name.includes(q)) ? '' : 'none';
  });
}

buildCards();
setTimeout(() => pingAll(), 400);
</script>
